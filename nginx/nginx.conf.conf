worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 1. HTTP Server (Port 80) - Redirects to HTTPS
    server {
       listen 80;
       server_name localhost;

       location / {
          return 301 https://$host$request_uri;
       }
    }

    # 2. HTTPS Server (Port 443) - SSL Termination & Routing
    server {
        listen 443 ssl;
        server_name localhost;

        # Certificates;
        ssl_certificate /etc/nginx/certs/app.pem;
        ssl_certificate_key /etc/nginx/certs/app.key;

        # SSL Settings;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy "default-src 'self';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Routing;
        # API;
        location ~ ^/(api|docs) {
            # TODO: host.docker.internal should be changed when nestjs server will be containerized;
            # host.docker.internal - allows the NGINX container to connect to host machine (configured in docker compose);
            proxy_pass ${PROTOCOL}://host.docker.internal:3000;

            # WebSocket Support;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Client app;
        location / {
           default_type text/plain;
           return 200 "Hello World!";
        }
    }
}
