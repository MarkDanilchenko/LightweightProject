worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 1. HTTP Server (Port 80) - Redirects to HTTPS
    server {
       listen 80;
       server_name localhost;

       location / {
          return 301 https://$host$request_uri;
       }
    }

    # 2. HTTPS Server (Port 443) - SSL Termination & Routing
    server {
        listen 443 ssl;
        server_name localhost;
        error_page 502 503 504 /50x.html;

        # Certificates;
        ssl_certificate /etc/nginx/certs/app.pem;
        ssl_certificate_key /etc/nginx/certs/app.key;

        # SSL Settings;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Response security headers;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy "default-src 'self';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Routing;
        # API;
        location ~ ^/(api|docs) {
            proxy_intercept_errors on;
            error_page 500 502 503 504 @api_error_path;

            # TODO: host.docker.internal should be changed when nestjs server will be containerized;
            # host.docker.internal - allows the NGINX container to connect to host machine (configured in docker compose);
            proxy_pass ${PROTOCOL}://host.docker.internal:3000;

            # WebSocket Support;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Request proxy headers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Errors handling from client;
        location = /50x.html {
            # internal means, that the error page is not accessible from the internet;
            internal;
            default_type text/html;

            return 503 '<!DOCTYPE html><html><body style="font-family:sans-serif;text-align:center;padding-top:10%"><h1>503 Service Unavailable</h1><p>Sorry, but the resource you are looking for is currently unavailable.</p><p>Please try again later.</p><p>If you are the application owner, check application logs to determine the time the error occurred.</p><p>If you are not the application owner, please contact the application administrator.</p><p>More information: <a href="https://www.nginx.com/resources/wiki/start/topics/tutorials/status/">https://www.nginx.com/resources/wiki/start/topics/tut</p></body></html>';
        }

        # Errors handling from API;
        location @api_error_path {
           default_type application/json;

           # Response headers;
           add_header Access-Control-Allow-Origin "http://localhost:5173" always;
           add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, PATCH, DELETE" always;
           add_header Access-Control-Allow-Credentials "true" always;
           add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;

           return 503 '{"statusCode": 503, "message": "Service temporarily unavailable. NGINX is unable to reach the backend service.", "error": "Service Unavailable"}';
        }

        # Client app;
        location / {
           default_type text/plain;

           return 200 "Hello World!";
        }
    }
}
