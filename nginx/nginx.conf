worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # 1. HTTP Server (Port 80) - Redirects to HTTPS
    server {
       listen 80;
       server_name localhost;

       location / {
          return 301 https://$host$request_uri;
       }
    }

    # 2. HTTPS Server (Port 443) - SSL Termination & Routing
    server {
        listen 443 ssl;
        server_name localhost;

        # Certificates;
        ssl_certificate /etc/nginx/certs/app.pem;
        ssl_certificate_key /etc/nginx/certs/app.key;

        # SSL Settings;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy "default-src 'self';" always;

        # Routing;
        # API;
        location ~ ^/(api|docs)/ {
            # TODO: should be changed when nestjs server will be containerized;
            proxy_pass http://host.docker.internal:3000; # host.docker.internal - allows the NGINX container to connect to host machine (configured in docker compose);

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Client app;
        location / {
           # TODO: frontend should be implemented here via proxy_pass to frontend app address http://host.docker.internal:????;
           default_type text/plain;
           return 200 "Hello World!";
        }
    }
}
